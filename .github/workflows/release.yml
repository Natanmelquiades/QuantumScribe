name: Build Windows release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-cpu.txt

      - name: Install CPU build dependencies
        run: python -m pip install -r requirements-cpu.txt -r requirements-test.txt

      - name: Test
        run: python -m pytest -q

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm QuantumScribe.spec

      - name: Create ZIP and checksum
        shell: pwsh
        run: |
          Compress-Archive -Path dist\QuantumScribe\* -DestinationPath QuantumScribe-Windows-x64.zip
          $hash = (Get-FileHash QuantumScribe-Windows-x64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  QuantumScribe-Windows-x64.zip" | Set-Content SHA256SUMS.txt -Encoding ascii

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" QuantumScribe-Windows-x64.zip SHA256SUMS.txt --generate-notes --verify-tag
