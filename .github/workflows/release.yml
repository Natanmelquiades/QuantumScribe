name: Build Windows and Linux release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-linux.txt

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev build-essential pkg-config \
            portaudio19-dev libcairo2-dev libgirepository-2.0-dev \
            gir1.2-gtk-3.0 gir1.2-ayatanaappindicator3-0.1

      - name: Build Linux application
        run: bash build_linux.sh

      - name: Validate and package Linux application
        run: |
          version=$(python -c "from localwhisper import __version__; print(__version__)")
          test -x dist/QuantumScribe/QuantumScribe
          tar -czf "QuantumScribe-Core-$version-Linux-x64.tar.gz" \
            -C dist QuantumScribe -C .. install_linux_shortcut.sh
          sha256sum "QuantumScribe-Core-$version-Linux-x64.tar.gz" > SHA256SUMS-Linux.txt

      - name: Create draft release with Linux assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(python -c "from localwhisper import __version__; print(__version__)")
          tag="${{ github.ref_name }}"
          assets=("QuantumScribe-Core-$version-Linux-x64.tar.gz" "SHA256SUMS-Linux.txt")
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --draft --generate-notes --verify-tag
          fi

  build-windows:
    needs: build-linux
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-cpu.lock
            requirements-build.lock
            requirements-test.lock
            requirements-cuda-component.txt
            requirements-vad-component.txt

      - name: Install validation dependencies
        run: python -m pip install --require-hashes -r requirements-test.lock

      - name: Validate release candidate
        run: |
          python -m compileall -q main.py localwhisper scripts tests
          python -m ruff check main.py localwhisper scripts tests
          python -m pytest -q
          python -m pip_audit -r requirements-cpu.lock --no-deps --disable-pip --progress-spinner off
          python -m pip_audit -r requirements-cuda-component.txt --no-deps --disable-pip --progress-spinner off
          python -m pip_audit -r requirements-vad-component.txt --no-deps --disable-pip --progress-spinner off

      - name: Install NSIS
        run: choco install nsis --version=3.11.0 --no-progress -y

      - name: Build Core and installer
        shell: pwsh
        run: .\build.ps1 -Installer

      - name: Assert Core has no heavy optional runtimes
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem dist\QuantumScribe -Recurse -ErrorAction Stop | Where-Object {
            $_.FullName -match '\\(torch|torchaudio|silero_vad|nvidia)(\\|$)'
          }
          if ($forbidden) {
            $forbidden.FullName | Write-Error
            throw "O Core contém dependências opcionais pesadas."
          }

      - name: Build verified optional components
        shell: pwsh
        run: .\scripts\build_optional_components.ps1

      - name: Create consolidated checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Select-String -Path localwhisper\__init__.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem dist\QuantumScribe-Setup-*-Windows-x64.exe -File -ErrorAction Stop | Select-Object -First 1
          $cuda = Get-ChildItem "dist\QuantumScribe-CUDA-$version-Windows-x64.zip" -File -ErrorAction Stop
          $vad = Get-ChildItem "dist\QuantumScribe-SileroVAD-$version-Windows-x64.zip" -File -ErrorAction Stop
          $files = @($installer.FullName, $cuda.FullName, $vad.FullName)
          gh release download $tag --pattern "SHA256SUMS-Linux.txt" --dir .
          if ($LASTEXITCODE -ne 0) {
            throw "Não foi possível obter o checksum do pacote Linux."
          }
          $linuxLines = Get-Content SHA256SUMS-Linux.txt
          $windowsLines = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $(Split-Path $file -Leaf)"
          }
          @($linuxLines) + @($windowsLines) | Set-Content SHA256SUMS.txt -Encoding ascii

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Select-String -Path localwhisper\__init__.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $installer = Get-ChildItem dist\QuantumScribe-Setup-*-Windows-x64.exe -File -ErrorAction Stop | Select-Object -First 1
          $tag = "${{ github.ref_name }}"
          $assets = @(
            $installer.FullName,
            "dist\QuantumScribe-CUDA-$version-Windows-x64.zip",
            "dist\QuantumScribe-SileroVAD-$version-Windows-x64.zip",
            "SHA256SUMS.txt"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --draft --generate-notes --verify-tag
          }
          gh release delete-asset $tag "SHA256SUMS-Linux.txt" --yes
          if ($LASTEXITCODE -ne 0) {
            throw "Não foi possível remover o checksum Linux temporário."
          }
          gh release delete-asset $tag "QuantumScribe-Core-$version-Windows-x64.zip" --yes *> $null
          gh release edit $tag --draft=false --latest
